      min: 2
      max: 30
      typical: "5-14"
    symptoms:
      fever: high                  # >90%
      rash: low                    # <10%
      arthralgia_myalgia: high     # >80% characteristic calf/back myalgia
      jaundice: low                # 5-10% Weil disease
      haemorrhagic_signs: low      # ~10% severe
      gi_symptoms: moderate        # 40-60% nausea, vomiting, abdominal pain
      respiratory_symptoms: moderate # 20-40% cough, pulmonary
      neurological_symptoms: low   # aseptic meningitis ~25%; headache common but non-specific

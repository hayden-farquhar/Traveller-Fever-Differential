# ============================================================
# Clinical Data Extraction — Graded Symptom Likelihoods
# 38 Diseases for Returned-Traveller Fever Differential
#
# Sources: CDC Yellow Book 2024, Harrison's 21e, Manson's 24e,
#          GeoSentinel publications (Bierbrier 2024, Duvignaud 2024),
#          WHO fact sheets, UpToDate
# Extracted: 2026-04-18 | Graded: 2026-04-20
#
# Symptom grading scheme:
#   high     — >70% prevalence among symptomatic cases  → P = 0.85
#   moderate — 30-70% prevalence                        → P = 0.50
#   low      — 5-30% prevalence                         → P = 0.15
#   false    — <5% prevalence or absent                 → P = 0.05
#
# Exposure routes remain binary (true/false).
# ============================================================

diseases:

  chikungunya:
    # Bierbrier 2024 (PMID 38195993): N=840 confirmed cases
    # Using exact published prevalences for key discriminating symptoms
    incubation_days:
      min: 1
      max: 12
      typical: "3-7"
    symptoms:
      fever: 0.687                 # 68.7% (Bierbrier 2024)
      rash: 0.355                  # 35.5% dermatologic (Bierbrier 2024)
      arthralgia_myalgia: 0.988    # 98.8% musculoskeletal (Bierbrier 2024) — hallmark
      jaundice: false
      haemorrhagic_signs: false
      gi_symptoms: 0.18            # ~18% nausea/vomiting
      respiratory_symptoms: false
      neurological_symptoms: false # GBS/encephalitis <1%
      productive_cough: false
      retro_orbital_pain: false
      small_joint_polyarthralgia: 0.90 # 90% bilateral small-joint (Bierbrier 2024)
    exposure_routes:
      mosquito: true
      freshwater: false
      animal_contact: false
      sexual: false
      needle_blood: true
      food_water: false
      respiratory_droplet: false
      tick: false

  cholera:
    incubation_days:

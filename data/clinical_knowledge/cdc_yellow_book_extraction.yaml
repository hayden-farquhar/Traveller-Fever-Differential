# ============================================================
# NOTES
# ============================================================
# 1. Symptom grading (high/moderate/low/false) replaces binary true/false.
#    Prevalence sources: GeoSentinel publications (Bierbrier 2024 for
#    chikungunya, Duvignaud 2024 for dengue), Harrison's 21e, Manson's 24e,
#    WHO fact sheets, UpToDate.
# 2. Cholera remains explicitly AFEBRILE.
# 3. "Neurological symptoms" = confusion, seizures, meningism, focal neuro
#    deficits. Headache alone is NOT counted (too non-specific).
# 4. Diseases in YAML but NOT in the pre-registered 33-diagnosis set
#    (retained as reference): cholera, leishmaniasis, meningococcal_disease,
#    norovirus, poliomyelitis, tick_borne_encephalitis.
# 5. Malaria split into malaria_falciparum (incubation 7-30d, mode 12d,
#    higher severity) and malaria_vivax (incubation 12-365d, mode 16d,
#    relapse tail, milder). Species-specific definitions replace the
#    old single 'malaria' entry + DEFINITION_KEY_MAP approach.
# 6. Non-standard vector fields retained for completeness.

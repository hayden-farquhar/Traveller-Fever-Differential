  malaria_falciparum:
    # P. falciparum: most dangerous species, predominant in SSA
    # Ref: WHO World Malaria Report; Sohail 2024 (PMID 38127641)
    incubation_days:
      min: 7
      max: 30                      # rarely >30d for falciparum (no hypnozoites)
      typical: "10-14"
    symptoms:
      fever: high                  # >95% — often continuous or irregularly periodic
      rash: false
      arthralgia_myalgia: 0.67     # 67% myalgia/arthralgia (Bottieau 2007, n=440)
      jaundice: low                # 10-15% (higher than vivax due to haemolysis)
      haemorrhagic_signs: low      # thrombocytopenia common (~70%) but frank bleeding ~10%
      gi_symptoms: 0.56            # 56% abdominal symptoms (Bottieau 2007, n=440)
      respiratory_symptoms: 0.17   # 17% (Bottieau 2007, n=440)
      neurological_symptoms: low   # cerebral malaria 2-5% (hallmark of severe falciparum)
      productive_cough: false
      retro_orbital_pain: false
      small_joint_polyarthralgia: false
    exposure_routes:
      mosquito: true
      freshwater: false
      animal_contact: false
      sexual: false
      needle_blood: true
      food_water: false
      respiratory_droplet: false
      tick: false

  malaria_vivax:
    # P. vivax/ovale/malariae: relapsing species, predominant in SCA/Oceania
    # Ref: WHO; Price 2020 NEJM; Sohail 2024 (PMID 38127641)
    # NOTE: max capped at 60d for acute differential context. Relapse
    # presentations (months-years) have different clinical context and the
    # patient would typically report prior malaria diagnosis.
    incubation_days:
      min: 12
      max: 60                      # capped for acute context; relapse tail modelled separately
      typical: "14-18"             # primary attack
    symptoms:
      fever: high                  # >95% — classic tertian (48h) periodicity
      rash: false
      arthralgia_myalgia: moderate # 30-40%
      jaundice: false              # less haemolysis than falciparum
      haemorrhagic_signs: false    # thrombocytopenia moderate but bleeding rare
      gi_symptoms: moderate        # 30-40% — hepatosplenomegaly more common in relapse
      respiratory_symptoms: false  # ARDS very rare in vivax
      neurological_symptoms: false # cerebral malaria essentially absent in vivax
      productive_cough: false
      retro_orbital_pain: false
      small_joint_polyarthralgia: false
    exposure_routes:
      mosquito: true
      freshwater: false
      animal_contact: false
      sexual: false
      needle_blood: true
      food_water: false
      respiratory_droplet: false
      tick: false


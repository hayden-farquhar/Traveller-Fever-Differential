    # Using exact published prevalences for key discriminating symptoms
    incubation_days:
      min: 3
      max: 10
      typical: "5-7"
    symptoms:
      fever: 0.870                 # 87.0% (Duvignaud 2024)
      rash: 0.289                  # 28.9% (Duvignaud 2024)
      arthralgia_myalgia: 0.83     # 83% myalgia/arthralgia combined (Bottieau 2007, n=64)
      jaundice: false
      haemorrhagic_signs: 0.15     # petechiae ~15%; severe dengue 1.6% (Duvignaud 2024)
      gi_symptoms: 0.42            # 42% abdominal symptoms (Bottieau 2007, n=64)
      respiratory_symptoms: low    # 28% (Bottieau 2007) — cough, URI-like prodrome
      neurological_symptoms: false # encephalitis <1%
      productive_cough: false
      retro_orbital_pain: 0.55 # 55% (Duvignaud 2024)
      small_joint_polyarthralgia: false
    exposure_routes:
      mosquito: true
      freshwater: false
      animal_contact: false
      sexual: true
      needle_blood: true
      food_water: false
      respiratory_droplet: false
      tick: false


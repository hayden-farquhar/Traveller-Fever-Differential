      rash: false                  # skin rashes <5%
      arthralgia_myalgia: moderate # ~40-50%
      jaundice: false
      haemorrhagic_signs: false
      gi_symptoms: low             # 10-20% diarrhoea/vomiting
      respiratory_symptoms: high   # >80% cough, sore throat, congestion
      neurological_symptoms: low   # anosmia/ageusia ~15-20% Omicron

name: Monthly priors update

on:
  schedule:
    # 1st of each month at 06:00 UTC
    - cron: "0 6 1 * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  update-priors:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Scrape ProMED
        run: python -m src.ingest.scrape_promed

      - name: Scrape WHO DON
        run: python -m src.ingest.scrape_who_don

      - name: Update live outbreak multipliers
        run: python -m src.priors.live_outbreak_smoothing

      - name: Commit refreshed priors directly to main if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/promed_archive/ data/raw/who_don_archive/ data/processed/
          if git diff --cached --quiet; then
            echo "No priors changes this month — nothing to commit."
            exit 0
          fi
          MONTH_TAG=$(date '+%Y-%m')
          MONTH_HUMAN=$(date '+%B %Y')
          git commit -m "chore: monthly priors update ${MONTH_TAG}" \
                     -m "Automated scrape of ProMED and WHO DON for ${MONTH_HUMAN}."
          git push origin HEAD:main
